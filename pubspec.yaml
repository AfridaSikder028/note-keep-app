name: note_keep_app
description: A comprehensive note-taking app inspired by Google Keep & MIUI Notes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Database ──────────────────────────────────────
  sqflite: ^2.4.1
  path: ^1.9.1
  path_provider: ^2.1.5
  
  file_picker: ^8.1.2
  
  # ── State management ─────────────────────────────
  provider: ^6.1.2

  # ── Navigation ───────────────────────────────────
  go_router: ^14.8.1

  # ── UI ───────────────────────────────────────────
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^6.2.1

  # ── Media ────────────────────────────────────────
  image_picker: ^1.2.2
  record: ^5.1.2
  just_audio: ^0.9.40
  cached_network_image: ^3.4.1

  # ── Notifications ────────────────────────────────
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # ── Permissions ──────────────────────────────────
  permission_handler: ^11.3.1

  # ── Rich text editor ─────────────────────────────
  flutter_quill: ^11.5.0

  # ── Drawing canvas ───────────────────────────────
  signature: ^5.4.1

  # ── Export & share ───────────────────────────────
  share_plus: ^10.1.4
  pdf: ^3.11.1
  screenshot: ^3.0.0

  # ── Firebase ─────────────────────────────────────
  firebase_core: ^3.10.0
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_auth: ^5.5.1
  google_sign_in: ^6.2.2
  device_info_plus: ^10.0.0

  # ── Biometric ────────────────────────────────────
  local_auth: ^2.3.0

  # ── Home screen widget ───────────────────────────
  home_widget: ^0.6.0

  # ── AI ───────────────────────────────────────────
  http: ^1.6.0

  # ── Utils ────────────────────────────────────────
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.5.2
  url_launcher: ^6.3.1
  flutter_dotenv: ^6.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/backgrounds/
    - assets/images/
    - .env